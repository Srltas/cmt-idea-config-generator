# CUBRID Migration Toolkit - IDEA Configuration Generator Settings

# IDEA 프로젝트 이름
workspaceName=cubrid-migration-idea

# Feature 경로 (projectsFolder 기준 상대경로)
featuresPaths=features

# Bundle 경로 (projectsFolder 기준 상대경로)
bundlesPaths=plugins

# Product 파일 경로 (projectsFolder 기준 상대경로)
productsPaths=product/com.cubrid.cubridmigration.desktop/cubridmigration.product

# Maven 기반 테스트 모듈 (IDEA에서 실행/디버깅 가능)
testModuleRoots=\
  tests/unit-test;\
  tests/e2e
