# CUBRID Migration Toolkit - IDEA Configuration Generator Settings
# Copy this file and modify paths according to your environment

# Workspace name - the generated IDEA project folder name
workspaceName=cubrid-migration-idea

# Feature paths (semicolon-separated, relative to projectsFolder)
featuresPaths=\
  cubrid-migration/features

# Bundle paths (semicolon-separated, relative to projectsFolder)
bundlesPaths=\
  cubrid-migration/plugins

# P2 repositories for external dependencies (semicolon-separated)
# ${eclipse-version} will be replaced with the --eclipse-version parameter
repositories=\
  https://ftp.cubrid.org/CUBRID_Tools/Dev/p2-site;\
  https://download.eclipse.org/releases/${eclipse-version}/

# Product definition files (semicolon-separated, relative to projectsFolder)
productsPaths=\
  cubrid-migration/product/com.cubrid.cubridmigration.desktop/cubridmigration.product

# Test bundle paths (semicolon-separated, optional)
testBundlePaths=\
  cubrid-migration/test

# Test libraries (semicolon-separated, optional)
testLibraries=\
  org.junit;\
  org.mockito.mockito-core

# Existing IDEA configuration to merge (optional)
ideaConfigurationFilesPaths=

# Additional module roots for non-OSGi modules (semicolon-separated, optional)
# Example: console application that is a regular JAR
additionalModuleRoots=\
  cubrid-migration/plugins/com.cubrid.cubridmigration.command

# Output patterns to exclude (semicolon-separated, optional)
excludeOutputs=\
  target;\
  bin

# Optional feature repositories (semicolon-separated, optional)
optionalFeatureRepositories=
